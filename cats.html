// Resolution integrates fn over phase t in steps of dt,
// accumulating into the real component r.
// The ground state (t=0) returns r directly.
// hbar is the theoretical phase resolution floor — dt defaults to 1 (operation depth).


const hbar = 1.0545718e-34

const E = function(fn){ 
    const I = function(r,t,dt=1){
        if (t<=0) return r;
        return I(r+fn(t)*dt,t-dt);
    };
    return function(t){
        return I(0,t);
    };
}
